# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    id: "xlsxsql"
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.revision={{.Commit}}
    main: ./cmd/xlsxsql
    ignore:
      - goos: windows
        goarch: "386"
archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
    - goos: windows
      formats: [zip]
release:
  extra_files:
    - glob: ./dist/*.rb
checksum:
  name_template: 'checksums.txt'
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
nfpms:
  -
    package_name: "xlsxsql"
    homepage: "https://github.com/noborus/xlsxsql"
    maintainer: "Noboru Saito <noborusai@gmail.com>"
    description: "A CLI tool to execute SQL queries on xlsx files"
    license: "MIT"
    formats:
      - deb
      - rpm

brews:
  -
    name: xlsxsql
    repository:
      owner: noborus
      name: homebrew-tap
    skip_upload: true
    homepage: https://github.com/noborus/xlsxsql
    description: "Execute SQL to xlsx and convert to other format"
    license: "MIT"
# modelines, feel free to remove those if you don't want/use them:
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
